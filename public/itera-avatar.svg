<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- Fondo circular -->
  <circle cx="500" cy="500" r="500" fill="#111214"/>

  <!-- Glow naranja sutil -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FF5723" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FF5723" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="500" cy="500" r="500"/>
    </clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect x="0" y="0" width="1000" height="1000" fill="url(#glow)"/>
  </g>

  <!-- Wordmark "Itera" centrado, I en naranja -->
  <text
    x="500" y="500"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Manrope, Arial Black, sans-serif"
    font-size="280"
    font-weight="800"
    fill="white"
    letter-spacing="-8"
  ><tspan fill="#FF5723">I</tspan>tera</text>
</svg>
